# Nginx configuration for videogen.beautyapp.work
# Place file at: /etc/nginx/sites-available/videogen

server {
    listen 80;
    server_name videogen.beautyapp.work;

    # Increase upload size limit for base64 uploads
    client_max_body_size 100M;

    # Proxy API to backend
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
    }

    # Frontend static files (if backend not serving them)
    # location / {
    #     proxy_pass http://127.0.0.1:3001;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    # }

    # Or serve static directly (uncomment and adjust path)
    # location / {
    #     root /var/www/videogen/dist;
    #     try_files $uri $uri/ /index.html;
    # }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:3001/api/health;
        access_log off;
    }
}
