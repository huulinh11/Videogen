name: Deploy Videogen to VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: ./client
        run: |
          npm ci
          npm run build

      - name: Install Server Dependencies
        working-directory: ./server
        run: npm ci

      - name: Deploy to VPS (copy files via SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "server,client/dist,Dockerfile,docker-compose.yml,nginx,.env.example"
          target: /opt/videogen/
          rm: false

      - name: Setup Environment & Restart Docker on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/videogen

            # Create .env if not exists
            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            # Update env with secrets
            sed -i "s/^ADMIN_USER=.*/ADMIN_USER=${{ secrets.ADMIN_USER }}/" .env
            sed -i "s/^ADMIN_PASSWORD=.*/ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}/" .env
            sed -i "s/^JWT_SECRET=.*/JWT_SECRET=${{ secrets.JWT_SECRET }}/" .env

            # Create data directory
            mkdir -p data

            # Reorganize files if needed (SCP preserves directory structure)
            ls -la

            # Stop and rebuild
            docker compose down 2>/dev/null || true
            docker compose up -d --build

            # Wait for server to start
            sleep 5

            # Health check
            echo "=== Health Check ==="
            curl -s http://localhost:3001/api/health || echo "Health check failed"
            echo ""
            echo "=== Deploy completed ==="
