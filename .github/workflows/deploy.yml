name: Deploy Videogen to VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Build Frontend
        working-directory: ./client
        run: |
          npm ci
          npm run build

      - name: Install Server Dependencies
        working-directory: ./server
        run: npm ci

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: |
            server/
            client/dist/
            Dockerfile
            docker-compose.yml
            nginx/
            .env.example
          target: /opt/videogen/
          strip_components: 0
          rm: false

      - name: Setup Environment & Restart on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /opt/videogen

            # Create .env if not exists
            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            # Set secrets
            sed -i "s/^ADMIN_USER=.*/ADMIN_USER=${{ secrets.ADMIN_USER }}/" .env || echo "ADMIN_USER=${{ secrets.ADMIN_USER }}" >> .env
            sed -i "s/^ADMIN_PASSWORD=.*/ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}/" .env || echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env
            sed -i "s/^JWT_SECRET=.*/JWT_SECRET=${{ secrets.JWT_SECRET || 'videogen-prod-jwt-'$RANDOM }}/" .env || echo "JWT_SECRET=${{ secrets.JWT_SECRET || 'videogen-prod-jwt' }}" >> .env

            # Create data directory
            mkdir -p data

            # Stop existing container if running
            docker compose down 2>/dev/null || true

            # Build and start
            docker compose up -d --build

            # Wait for server to start
            sleep 5

            # Setup Nginx if not already configured
            if [ ! -f /etc/nginx/sites-enabled/videogen ]; then
              cp nginx/videogen.conf /etc/nginx/sites-available/videogen
              ln -sf /etc/nginx/sites-available/videogen /etc/nginx/sites-enabled/videogen
              nginx -t && systemctl reload nginx
            fi

            # Health check
            echo "=== Health Check ==="
            curl -s http://localhost:3001/api/health || echo "Health check failed (retrying in 5s)"
            echo ""
            echo "Deploy completed!"
